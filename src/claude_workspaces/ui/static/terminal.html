<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="vendor/xterm.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            max-width: 100vw;
            height: 100%;
            background: #0e0e0e;
            overflow: hidden;
        }
        #terminal {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            /* right:4px em vez de width calc — garante que o elemento nunca
               ultrapasse o viewport mesmo que xterm infle o layout da página */
            right: 4px;
            max-width: calc(100vw - 8px);
            overflow: hidden;
        }
        /* Sem scroll horizontal — o FitAddon garante que cols caiba na
         * largura disponível; qualquer overflow horizontal é artefato de
         * timing de resize e não deve mostrar barra. */
        .xterm-viewport,
        .xterm-screen,
        .xterm {
            overflow-x: hidden !important;
        }
        .xterm-viewport::-webkit-scrollbar:horizontal {
            display: none;
            height: 0;
        }
        /* Scrollbar vertical do viewport do xterm com visual minimalista —
         * thumb sutil, sem track, fica fora do caminho. Hover destaca
         * sem chamar atenção desnecessária. */
        .xterm-viewport::-webkit-scrollbar {
            width: 8px;
        }
        .xterm-viewport::-webkit-scrollbar-track {
            background: transparent;
        }
        .xterm-viewport::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.10);
            border-radius: 4px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background: rgba(229, 181, 59, 0.55);
            background-clip: padding-box;
            border: 2px solid transparent;
        }
        .xterm-viewport::-webkit-scrollbar-corner {
            background: transparent;
        }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script src="vendor/xterm.js"></script>
    <script src="vendor/addon-fit.js"></script>
    <script src="terminal.js"></script>
</body>
</html>
