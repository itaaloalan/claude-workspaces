name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          # Os testes só batem em models/storage/settings — sem
          # PySide6, que pesa muito e não cabe no runner sem GUI.
          pip install pytest
      - name: Run tests
        run: pytest -v
        env:
          PYTHONPATH: src
