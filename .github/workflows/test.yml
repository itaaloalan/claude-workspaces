name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff
        run: ruff check src/ tests/

  mypy:
    runs-on: ubuntu-latest
    # mypy não bloqueia merge — relata regressões mas não falha o job.
    # Pra tornar bloqueante: remover `|| true`.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Mypy
        run: mypy || true

  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install system deps (Qt offscreen requer libs nativas)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libxkbcommon0 libdbus-1-3 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          # Editable arrasta PySide6 + PyYAML do pyproject — vários testes
          # importam Qt widgets (com QApplication offscreen) e o subsistema
          # de plugins parsea YAML.
          pip install -e ".[dev]"
      - name: Run tests + coverage
        run: pytest --cov --cov-report=term-missing --cov-report=xml -v
        env:
          PYTHONPATH: src
          QT_QPA_PLATFORM: offscreen
      - name: Upload coverage artifact
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
