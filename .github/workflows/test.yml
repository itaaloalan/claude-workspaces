name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff
        run: ruff check src/ tests/

  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          # Testes não tocam UI — sem PySide6 no runner.
          pip install pytest
      - name: Run tests
        run: pytest -v
        env:
          PYTHONPATH: src
